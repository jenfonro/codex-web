<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Web 登录</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1e1e1e;
        --panel: #252526;
        --border: #3c3c3c;
        --text: #cccccc;
        --muted: #9d9d9d;
        --blue: #0e639c;
        --blue-hover: #1177bb;
        --error: #f48771;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(360px, calc(100vw - 32px));
        border: 1px solid var(--border);
        background: var(--panel);
        padding: 24px;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 18px;
        font-weight: 600;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
      }

      input {
        width: 100%;
        height: 32px;
        border: 1px solid var(--border);
        background: #313131;
        color: var(--text);
        padding: 4px 8px;
        outline: none;
      }

      input:focus {
        border-color: #007fd4;
      }

      button {
        width: 100%;
        height: 32px;
        margin-top: 14px;
        border: 0;
        background: var(--blue);
        color: #ffffff;
        cursor: pointer;
      }

      button:hover {
        background: var(--blue-hover);
      }

      p {
        min-height: 20px;
        margin: 12px 0 0;
        color: var(--error);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Codex Web</h1>
      <form id="login-form">
        <label for="password">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" autofocus />
        <button type="submit">登录</button>
        <p id="message" role="alert"></p>
      </form>
    </main>
    <script>
      var form = document.getElementById("login-form");
      var input = document.getElementById("password");
      var message = document.getElementById("message");

      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        message.textContent = "";
        try {
          var response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ password: input.value }),
          });
          if (!response.ok) {
            message.textContent = "密码不正确";
            return;
          }
          window.location.href = "/";
        } catch (error) {
          message.textContent = "登录失败";
        }
      });
    </script>
  </body>
</html>
